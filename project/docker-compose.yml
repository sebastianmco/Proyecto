version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: fazt
      POSTGRES_PASSWORD: faztpassword
      POSTGRES_DB: nodepg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fazt -d nodepg"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: fazt
      DB_PASSWORD: faztpassword
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: nodepg
      PORT: 3000
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
