services:
  - type: web
    name: users-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: users-db
          property: connectionString

databases:
  - name: users-db
    plan: free
    region: oregon
